name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install the exact toolchain + components pinned in rust-toolchain.toml
      # (single source of truth shared with local dev). `rustup show` triggers
      # the auto-install of the pinned channel.
      - name: Install pinned Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
