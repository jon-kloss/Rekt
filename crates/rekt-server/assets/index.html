<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>REKT</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0d1117; color: #e6edf3;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  header {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 1.5rem;
    padding: 1rem 1.5rem; border-bottom: 1px solid #21262d;
    position: sticky; top: 0; background: #0d1117ee; backdrop-filter: blur(4px);
  }
  h1 { font-size: 1.6rem; letter-spacing: 0.25em; margin: 0; }
  h1 span { color: #f85149; }
  .stat { display: flex; flex-direction: column; }
  .stat .label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat .val { font-size: 1.25rem; }
  .badge {
    margin-left: auto; align-self: center; font-size: 0.7rem;
    padding: 0.25rem 0.6rem; border-radius: 999px; border: 1px solid #30363d; color: #8b949e;
  }
  .badge.open { color: #3fb950; border-color: #3fb95055; }
  .badge.live { color: #58a6ff; border-color: #58a6ff55; }
  main { padding: 1.5rem; display: grid; gap: 2rem; max-width: 1100px; margin: 0 auto; }
  h2 { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.15em; margin: 0 0 0.75rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { text-align: right; padding: 0.45rem 0.6rem; border-bottom: 1px solid #21262d; white-space: nowrap; }
  th { color: #8b949e; font-weight: normal; font-size: 0.7rem; text-transform: uppercase; }
  th:first-child, td:first-child { text-align: left; }
  .up { color: #3fb950; } .down { color: #f85149; } .muted { color: #8b949e; }
  .empty { color: #8b949e; padding: 1.5rem 0; text-align: center; }
  form.tx {
    display: grid; gap: 0.5rem; align-items: end;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  }
  form.tx label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.65rem; color: #8b949e; text-transform: uppercase; }
  input, select, button {
    font: inherit; padding: 0.5rem 0.6rem; border-radius: 6px;
    border: 1px solid #30363d; background: #161b22; color: inherit; min-width: 0;
  }
  button { cursor: pointer; }
  button.primary { background: #1f6feb; border-color: #1f6feb; }
  button.danger { background: none; border: none; color: #f85149; padding: 0 0.4rem; }
  #msg { min-height: 1.2rem; font-size: 0.8rem; color: #d29922; }
  .csv { display: flex; gap: 0.75rem; align-items: center; font-size: 0.8rem; color: #8b949e; flex-wrap: wrap; }
  .warn { color: #d29922; font-size: 0.8rem; }
</style>
</head>
<body>
<header>
  <h1>R<span>E</span>KT</h1>
  <div class="stat"><span class="label">Equity</span><span class="val" id="equity">—</span></div>
  <div class="stat"><span class="label">Day P&amp;L</span><span class="val" id="day">—</span></div>
  <div class="stat"><span class="label">Unrealized</span><span class="val" id="unreal">—</span></div>
  <div class="stat"><span class="label">Cash</span><span class="val" id="cash">—</span></div>
  <span class="badge" id="market">…</span>
  <span class="badge" id="feed">…</span>
</header>
<main>
  <div id="warn" class="warn"></div>

  <section>
    <h2>Positions</h2>
    <table>
      <thead><tr>
        <th>Symbol</th><th>Qty</th><th>Avg cost</th><th>Price</th>
        <th>Mkt value</th><th>Day Δ</th><th>Total Δ</th><th>Realized</th>
      </tr></thead>
      <tbody id="positions"><tr><td colspan="8" class="empty">no positions yet — add a buy below</td></tr></tbody>
    </table>
  </section>

  <section>
    <h2>Add transaction</h2>
    <form class="tx" id="txform">
      <label>Kind
        <select name="kind" id="kind">
          <option value="buy">buy</option><option value="sell">sell</option>
          <option value="deposit">deposit</option><option value="withdrawal">withdrawal</option>
          <option value="dividend">dividend</option><option value="split">split</option>
        </select>
      </label>
      <label>Symbol<input name="symbol" placeholder="AAPL" style="text-transform:uppercase"></label>
      <label id="l-qty">Qty<input name="qty" inputmode="decimal"></label>
      <label id="l-price">Price<input name="price" inputmode="decimal"></label>
      <label>Fees<input name="fees" inputmode="decimal" placeholder="0"></label>
      <label>When<input name="ts" type="datetime-local"></label>
      <label>Note<input name="note"></label>
      <button class="primary">add</button>
    </form>
    <div id="msg"></div>
    <div class="csv">
      <span>CSV import (<code>kind,symbol,qty,price,fees,taxes,ts,note</code>):</span>
      <input type="file" id="csvfile" accept=".csv,text/csv">
    </div>
  </section>

  <section>
    <h2>Transactions</h2>
    <table>
      <thead><tr><th>When</th><th>Kind</th><th>Symbol</th><th>Qty</th><th>Price</th><th>Fees</th><th>Note</th><th></th></tr></thead>
      <tbody id="txs"><tr><td colspan="8" class="empty">nothing yet</td></tr></tbody>
    </table>
  </section>
</main>
<script>
const $ = (id) => document.getElementById(id);
// Every server-sourced string that lands in innerHTML goes through esc() —
// notes/symbols are user input (forms, CSV files) and must never execute.
const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const fmt = (s, dash = "—") => {
  if (s === null || s === undefined) return dash;
  const n = Number(s);
  return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const signed = (s) => {
  if (s === null || s === undefined) return { text: "—", cls: "muted" };
  const n = Number(s);
  if (n === 0) return { text: "0.00", cls: "muted" };
  return { text: (n > 0 ? "+" : "") + fmt(s), cls: n > 0 ? "up" : "down" };
};

// Reload the transaction table only when the server says the log changed.
let txRevision = null;
function trackRevision(payload) {
  if (payload.tx_revision !== undefined && payload.tx_revision !== txRevision) {
    txRevision = payload.tx_revision;
    loadTxs();
  }
}

function renderPortfolio(payload) {
  trackRevision(payload);
  if (payload.type === "error") { $("warn").textContent = payload.error; return; }
  $("warn").textContent = payload.portfolio.unpriced_symbols.length
    ? `no price data for: ${payload.portfolio.unpriced_symbols.join(", ")} (equity excludes them)` : "";
  const p = payload.portfolio;
  $("equity").textContent = "$" + fmt(p.equity);
  const day = signed(p.day_pnl); $("day").textContent = day.text; $("day").className = "val " + day.cls;
  const un = signed(p.unrealized_pnl); $("unreal").textContent = un.text; $("unreal").className = "val " + un.cls;
  $("cash").textContent = "$" + fmt(p.cash);
  $("market").textContent = payload.market === "open" ? "market open" : "market closed";
  $("market").className = "badge" + (payload.market === "open" ? " open" : "");
  $("feed").textContent = payload.live_feed ? "live" : "no feed";
  $("feed").className = "badge" + (payload.live_feed ? " live" : "");

  const tbody = $("positions");
  if (!p.positions.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">no positions yet — add a buy below</td></tr>`;
    return;
  }
  tbody.innerHTML = p.positions.map((pos) => {
    const day = signed(pos.day_pnl), tot = signed(pos.unrealized_pnl), re = signed(pos.realized_pnl);
    const pct = pos.unrealized_pnl_pct === null ? "" : ` (${signed(pos.unrealized_pnl_pct).text}%)`;
    return `<tr>
      <td>${esc(pos.symbol)}</td><td>${esc(pos.qty)}</td><td>${fmt(pos.avg_cost)}</td>
      <td>${fmt(pos.price)}</td><td>${fmt(pos.market_value)}</td>
      <td class="${day.cls}">${day.text}</td>
      <td class="${tot.cls}">${tot.text}${pct}</td>
      <td class="${re.cls}">${re.text}</td>
    </tr>`;
  }).join("");
}

async function loadTxs() {
  const txs = await (await fetch("/api/transactions")).json();
  const tbody = $("txs");
  if (!txs.length) { tbody.innerHTML = `<tr><td colspan="8" class="empty">nothing yet</td></tr>`; return; }
  tbody.innerHTML = txs.map((t) => `<tr>
    <td>${esc(t.ts.slice(0, 16).replace("T", " "))}</td><td>${esc(t.kind)}</td>
    <td>${esc(t.symbol)}</td><td>${esc(t.qty)}</td><td>${fmt(t.price)}</td><td>${fmt(t.fees)}</td>
    <td>${esc(t.note)}</td>
    <td><button class="danger" data-id="${esc(t.id)}" title="delete">✕</button></td>
  </tr>`).join("");
}

async function refresh() {
  try {
    // trackRevision inside renderPortfolio reloads the tx table when needed.
    renderPortfolio(await (await fetch("/api/portfolio")).json());
  } catch { $("warn").textContent = "server unreachable"; }
}

// Live updates: websocket with polling fallback.
let pollTimer = null;
function connect() {
  const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/api/ws`);
  ws.onmessage = (e) => renderPortfolio(JSON.parse(e.data));
  ws.onopen = () => { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } };
  ws.onclose = () => {
    if (!pollTimer) pollTimer = setInterval(refresh, 15000);
    setTimeout(connect, 3000);
  };
}

$("txform").addEventListener("submit", async (e) => {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = { kind: f.get("kind") };
  for (const k of ["symbol", "qty", "price", "fees", "note"]) {
    const v = (f.get(k) || "").toString().trim();
    if (v) body[k] = k === "symbol" ? v.toUpperCase() : v;
  }
  if (f.get("ts")) body.ts = new Date(f.get("ts")).toISOString();
  try {
    const res = await fetch("/api/transactions", {
      method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
    });
    if (!res.ok) { $("msg").textContent = (await res.json()).error; return; }
    $("msg").textContent = ""; e.target.reset();
    refresh();
  } catch {
    $("msg").textContent = "request failed — is the server up? Transaction may not be saved.";
  }
});

// Delete buttons are created per-row; delegate one listener on the table.
$("txs").addEventListener("click", async (e) => {
  const id = e.target.dataset?.id;
  if (!id || !confirm("Delete this transaction? Derived positions will be recomputed.")) return;
  try {
    const res = await fetch(`/api/transactions/${id}`, { method: "DELETE" });
    if (!res.ok) { $("msg").textContent = (await res.json()).error; return; }
    $("msg").textContent = "";
    refresh();
  } catch {
    $("msg").textContent = "delete failed — is the server up?";
  }
});

$("kind").addEventListener("change", () => {
  const kind = $("kind").value;
  $("l-qty").firstChild.textContent = kind === "split" ? "Ratio" : "Qty";
  $("l-price").firstChild.textContent =
    kind === "deposit" || kind === "withdrawal" || kind === "dividend" ? "Amount" : "Price";
});

$("csvfile").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const res = await fetch("/api/import/csv", { method: "POST", body: await file.text() });
    const json = await res.json();
    $("msg").textContent = res.ok ? `imported ${json.imported} transactions` : json.error;
  } catch {
    $("msg").textContent = "import failed — is the server up? Nothing was imported.";
  }
  e.target.value = "";
  refresh();
});

refresh();
connect();
</script>
</body>
</html>
