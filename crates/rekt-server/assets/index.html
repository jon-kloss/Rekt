<style>
  /* Terminal Pro design tokens — see design_handoff README. Monospace,
     sharp-cornered, dark. Font degrades to system mono if Google Fonts is
     unreachable (self-hosted, offline-tolerant). */
  :root{
    --bg:#06080B; --panel:#0B0E13; --panel2:#080B10; --border:#161B22; --hairline:#0F141B;
    --grid:#10151C; --text:#D2D9E2; --bright:#EDF1F7; --body:#A8B2C0; --label:#7E8898;
    --faint:#5C6675; --amber:#E6A93E; --green:#2FBF71; --red:#FF5C57; --blue:#4A9EE0;
    --purple:#A877E0; --gray:#6C7686;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);}
  body{font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased;}
  ::selection{background:rgba(230,169,62,0.25);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#1A212B;border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  @keyframes blinkCursor{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--amber);outline-offset:1px;}
  input::placeholder{color:#4C5666;}
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div id="app"></div>
<div class="vh" aria-live="assertive" id="announce"></div>
<script>
"use strict";
//================================================================ helpers
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const C = { bg:'#06080B', panel:'#0B0E13', panel2:'#080B10', border:'#161B22', hairline:'#0F141B', grid:'#10151C',
  text:'#D2D9E2', bright:'#EDF1F7', body:'#A8B2C0', label:'#7E8898', faint:'#5C6675', amber:'#E6A93E',
  green:'#2FBF71', red:'#FF5C57', blue:'#4A9EE0', purple:'#A877E0', gray:'#6C7686' };
const num = (v) => { const n = Number(v); return Number.isFinite(n) ? n : 0; };
const has = (v) => v !== null && v !== undefined && v !== "";
function money(n){ return '$' + Math.abs(num(n)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function signedMoney(n){ n = num(n); return (n>=0?'+$':'−$') + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function signedPct(n){ n = num(n); return (n>=0?'+':'−') + Math.abs(n).toFixed(2) + '%'; }
function qtyFmt(n){ return num(n).toLocaleString('en-US',{maximumFractionDigits:4}); }
function compact(n){ n = num(n); const a=Math.abs(n); if(a>=1e6) return '$'+(n/1e6).toFixed(2)+'M'; if(a>=1e3) return '$'+(n/1e3).toFixed(1)+'k'; return money(n); }
// Drawdown severity gauge: a professional risk read (label + color), driven
// by % off peak equity.
function rektMeter(dd){
  if(dd<1) return {label:'MINIMAL', color:C.green};
  if(dd<5) return {label:'LOW', color:C.green};
  if(dd<10) return {label:'MODERATE', color:C.amber};
  if(dd<20) return {label:'ELEVATED', color:C.amber};
  if(dd<35) return {label:'HIGH', color:C.red};
  return {label:'SEVERE', color:C.red};
}
const UP=C.green, DN=C.red, AM=C.amber;
const dirColor = (n) => num(n) > 0 ? UP : num(n) < 0 ? DN : C.label;

//================================================================ markdown (AI output)
// Render a SAFE subset of markdown. CRITICAL: escape HTML first, then apply
// markdown transforms to the escaped text — so server/AI output can never
// inject markup (the esc() invariant holds), only our own tags are produced.
function mdInline(s){
  return s
    .replace(/`([^`]+)`/g, '<code style="background:#11161D;border:1px solid '+C.border+';border-radius:3px;padding:1px 5px;font-size:0.92em;">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong style="color:'+C.bright+';font-weight:600;">$1</strong>')
    .replace(/(^|[^*\w])\*([^*\n]+)\*/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:'+C.blue+';text-decoration:underline;">$1</a>');
}
function mdToHtml(src){
  const lines=esc(src||'').split('\n');
  let html='', list=null;
  const close=()=>{ if(list){ html+='</'+list+'>'; list=null; } };
  for(const raw of lines){
    const line=raw.replace(/\s+$/,'');
    let m;
    if(/^\s*###\s+/.test(line)){ close(); html+='<div style="font-size:12px;font-weight:600;color:'+C.bright+';letter-spacing:0.4px;margin:12px 0 4px;">'+mdInline(line.replace(/^\s*###\s+/,''))+'</div>'; }
    else if(/^\s*##\s+/.test(line)){ close(); html+='<div style="font-size:11px;font-weight:700;color:'+C.amber+';letter-spacing:1px;text-transform:uppercase;margin:15px 0 6px;">'+mdInline(line.replace(/^\s*##\s+/,''))+'</div>'; }
    else if(/^\s*#\s+/.test(line)){ close(); html+='<div style="font-size:14px;font-weight:700;color:'+C.bright+';margin:14px 0 6px;">'+mdInline(line.replace(/^\s*#\s+/,''))+'</div>'; }
    else if(/^\s*---+\s*$/.test(line)){ close(); html+='<hr style="border:none;border-top:1px solid '+C.border+';margin:11px 0;">'; }
    else if((m=line.match(/^\s*[-*]\s+(.*)$/))){ if(list!=='ul'){ close(); html+='<ul style="margin:5px 0 5px 18px;padding:0;">'; list='ul'; } html+='<li style="margin:3px 0;">'+mdInline(m[1])+'</li>'; }
    else if((m=line.match(/^\s*\d+\.\s+(.*)$/))){ if(list!=='ol'){ close(); html+='<ol style="margin:5px 0 5px 20px;padding:0;">'; list='ol'; } html+='<li style="margin:3px 0;">'+mdInline(m[1])+'</li>'; }
    else if(line.trim()===''){ close(); }
    else { close(); html+='<div style="margin:5px 0;">'+mdInline(line)+'</div>'; }
  }
  close();
  return html;
}
// One highly-skimmable line for the top: an explicit TL;DR / bottom-line /
// headline section if present, else the first real paragraph. Markdown
// stripped to plain text; escape at the call site.
function mdSummary(src){
  const text=String(src||'');
  const sec=text.match(/^#{1,3}\s*(?:tl;?dr|bottom[ -]?line|headline|summary|key takeaway)[^\n]*\n+([\s\S]*?)(?:\n\s*\n|\n#{1,3}\s|$)/im);
  let s = sec ? sec[1] : '';
  if(!s.trim()){
    const paras=text.split(/\n\s*\n/).map(p=>p.trim()).filter(p=>p && !/^#{1,6}\s/.test(p));
    s = paras[0]||'';
  }
  s = s.replace(/^[-*]\s+/gm,'').replace(/[*_`>#]/g,'').replace(/\[([^\]]+)\]\([^)]*\)/g,'$1').replace(/\s+/g,' ').trim();
  // Show the whole bottom-line/headline. Only trim if it's genuinely long, and
  // then at a SENTENCE boundary so it never cuts off mid-thought.
  const LIM=700;
  if(s.length<=LIM) return s;
  const cut=s.slice(0,LIM), lastEnd=Math.max(cut.lastIndexOf('. '),cut.lastIndexOf('! '),cut.lastIndexOf('? '));
  return lastEnd>250 ? cut.slice(0,lastEnd+1) : cut.replace(/\s+\S*$/,'')+'…';
}
// Highly-skimmable TL;DR card for the top of an analysis. Empty until a real
// analysis exists (briefingHead is set only then). Server text → esc().
function aiSummaryCard(){
  if(!M.briefingHead) return '';
  const s=mdSummary(M.briefing);
  if(!s) return '';
  return '<div style="display:flex;gap:11px;align-items:flex-start;background:rgba(230,169,62,0.06);border:1px solid #2A2517;border-left:3px solid '+C.amber+';border-radius:4px;padding:11px 14px;margin-bottom:14px;">'+
    '<span style="font-size:9px;font-weight:700;letter-spacing:1px;color:'+C.amber+';padding-top:3px;flex-shrink:0;">TL;DR</span>'+
    '<span style="font-size:12.5px;line-height:1.55;color:'+C.bright+';">'+esc(s)+'</span></div>';
}
// Honest analyst badge: which backend actually produced the analysis. The CLI
// runs whatever model your Claude Code is set to (NOT necessarily Haiku), so we
// name the backend, not a hardcoded model.
function analystBadge(){
  return M.analystBackend==='cli' ? 'CLAUDE CODE · CLI' : M.analystBackend==='http' ? 'CLAUDE API' : M.analystBackend==='ollama' ? 'OLLAMA · LOCAL' : 'AI';
}
// Spend is a real charge on the HTTP/API backend, but only an ESTIMATE on the
// CLI backend (it runs under your Claude subscription; we price token usage as
// a proxy). Mark CLI figures with a ~ so they're not read as an actual bill.
function analystCost(usd){ return (M.analystBackend==='cli'?'~':'')+money(usd); }
// The report body with the lead TL;DR/bottom-line section removed — the card
// above already shows it, so don't repeat it below.
function mdStripSummary(src){
  // (?![\s\S]) is a true end-of-string anchor — `$` under /m would match
  // end-of-LINE and strip only the first line of a multi-line TL;DR.
  return String(src||'').replace(/^#{1,3}\s*(?:tl;?dr|bottom[ -]?line|headline|summary|key takeaway)\b[^\n]*\n+[\s\S]*?(?=\n#{1,3}\s|(?![\s\S]))/im,'').replace(/^\s+/,'');
}

//================================================================ state + data store
const VIEWS = ['overview','positions','performance','analyst','watchlist','alerts','blotter','taxes','ledger'];
const S = {
  view:'positions', selSym:null, cmd:'', showHelp:false, expanded:null, candleRange:'6m',
  briefOpen:true, hoverIdx:null, eqHoverIdx:null, toast:'', halted:false, dockOpen:true, confirmDelTx:null, switching:'',
  side:'buy', otype:'market', tSym:'', tQty:'5', tLimit:'', basket:[],
  importOpen:false, importFmt:'generic', importText:'', importPreview:null, importErr:'', importBusy:false,
  manageOpen:false, confirmDelPf:null,
  newAlert:{sym:'',cond:'price_below',thr:'',note:''},
  wlAddText:'', ideasAnalyzing:false, marketBriefing:false,
};
// M holds the latest server-derived data the views render from.
const M = {
  ready:false, cash:0, equity:0, dayPnl:0, dayPct:0, unreal:0, realized:0, dividends:0,
  market:'closed', liveFeed:false, tradingEnabled:false,
  paperCash:null, paperEquity:null, paperBuyingPower:null, paperPositions:{},
  positions:[], watchlist:[], alerts:[], orders:[], txns:[], recs:[], track:{favorable:0,tested:0},
  watchlists:[], wlActive:null, wlMembers:[], screenerSettings:{stock:'balanced',etf:'balanced'}, ideas:{ideas:[],scanned:0,awaiting_data:0},
  briefing:'', briefingHead:'', analystEnabled:false, analystBackend:null, todayCost:0, budget:0,
  hist:[], metrics:{}, totals:{}, tax:null, taxYear:null, taxYears:[],
  candleCache:{}, lastPrices:{}, portfolios:[], activePortfolio:'',
  gauges:{gauges:[],brief:null}, gaugesErr:false, demo:false,
  splits:{supported:true,missing:[]},
};

//================================================================ API
async function jget(url){ const r = await fetch(url); if(!r.ok) throw new Error(url+' '+r.status); return r.json(); }
async function japi(method, url, body){
  const r = await fetch(url, { method, headers: body?{'content-type':'application/json'}:undefined, body: body?JSON.stringify(body):undefined });
  const j = r.status===204 ? {} : await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error || (method+' '+url+' '+r.status));
  return j;
}

function applyPortfolio(p){
  if(!p || p.type==='error'){ return; }
  const pf = p.portfolio || {};
  M.cash = num(pf.cash); M.equity = num(pf.equity); M.dayPnl = num(pf.day_pnl);
  M.unreal = num(pf.unrealized_pnl); M.realized = num(pf.realized_pnl); M.dividends = num(pf.dividends);
  M.dayPct = (M.equity - M.dayPnl) !== 0 ? M.dayPnl/(M.equity - M.dayPnl)*100 : 0;
  if(has(p.active_portfolio)) M.activePortfolio = p.active_portfolio;
  M.demo = !!p.demo;
  M.market = p.market || 'closed';
  M.liveFeed = !!p.live_feed;
  M.tradingEnabled = !!(p.trading && p.trading.enabled);
  S.halted = !!(p.trading && p.trading.paused);
  // Paper account/holdings — what the order ticket can actually trade
  // (segregated from the tracked live portfolio above).
  const tr = p.trading || {}, acct = tr.account || null;
  M.paperCash = acct && has(acct.cash) ? num(acct.cash) : null;
  M.paperEquity = acct && has(acct.equity) ? num(acct.equity) : null;
  M.paperBuyingPower = acct && has(acct.buying_power) ? num(acct.buying_power) : null;
  M.paperPositions = {};
  if(tr.positions && typeof tr.positions === 'object'){ for(const k in tr.positions){ M.paperPositions[k] = num(tr.positions[k]); } }
  M.positions = (pf.positions || []).map(pos => {
    const prev = M.lastPrices[pos.symbol];
    const price = has(pos.price) ? num(pos.price) : null;
    const dir = (price!=null && prev!=null) ? (price>prev?1:price<prev?-1:0) : 0;
    if(price!=null) M.lastPrices[pos.symbol] = price;
    return {
      sym: pos.symbol, qty: num(pos.qty), avg: num(pos.avg_cost), price,
      value: has(pos.market_value)?num(pos.market_value):null,
      day: has(pos.day_pnl)?num(pos.day_pnl):null,
      total: has(pos.unrealized_pnl)?num(pos.unrealized_pnl):null,
      totalPct: has(pos.unrealized_pnl_pct)?num(pos.unrealized_pnl_pct):null,
      realized: num(pos.realized_pnl), signals: pos.signals || null, dir,
    };
  });
  if(S.selSym==null && M.positions.length) S.selSym = M.positions[0].sym;
  if(!S.tSym && M.positions.length) S.tSym = M.positions[0].sym;
  M.watchlist = (p.watchlist || []).map(w => ({ sym:w.symbol, price:has(w.price)?num(w.price):null, prevClose:has(w.prev_close)?num(w.prev_close):null, signals:w.signals||null }));
  M.alerts = (p.alerts || []).map(a => ({
    id:a.id, sym:a.symbol, condition:a.condition, threshold:num(a.threshold), status:a.status,
    triggeredValue:a.triggered_value, triggeredTs:a.triggered_ts, draft:a.draft_order||null, note:a.note||'',
  }));
}
function applyHistory(h){ M.hist = h.points||[]; M.metrics = h.metrics||{}; M.totals = h.totals||{}; }
function applyOrders(list){ M.orders = (list||[]).map(o => ({
  id:o.id, ts:(o.submitted_ts||'').slice(0,16).replace('T',' '), sym:o.symbol, side:o.side, order_type:o.order_type,
  qty:num(o.qty), limit:has(o.limit_price)?num(o.limit_price):null, status:o.status, filled:num(o.filled_qty),
  avg:has(o.avg_fill_price)?num(o.avg_fill_price):null })); }
function applyTxns(list){ M.txns = (list||[]).map(t => ({ id:t.id, ts:(t.ts||'').slice(0,16).replace('T',' '), kind:t.kind, sym:t.symbol||'', qty:num(t.qty), price:num(t.price), fees:num(t.fees), note:t.note||'', mode:t.mode||'live' })); }
function applyAnalyst(a){
  M.analystEnabled = !!a.enabled; M.analystBackend = a.backend || null; M.todayCost = num(a.today_cost_usd); M.budget = num(a.budget_usd);
  M.track = a.track_record || {favorable:0,tested:0};
  const lat = a.latest;
  if(lat && lat.report_md){ M.briefing = lat.report_md;
    M.briefingHead = (lat.kind||'').replace('_',' ') + ' · ' + (lat.started_ts||'').slice(0,16).replace('T',' ') + ' · ' + analystCost(lat.cost_usd); }
  else { M.briefing = a.enabled ? 'No analysis yet — trigger a briefing or weekly review.' : 'AI analyst disabled. Pick a backend via REKT_ANALYST_BACKEND: cli (default, local Claude Code), http (ANTHROPIC_API_KEY), or ollama (free local model — start Ollama and `ollama pull llama3.1`).'; M.briefingHead = ''; }
  M.recs = (a.recommendations||[]).filter(r=>r.status==='open'||r.status==='accepted').map(r => {
    const oc = r.outcome;
    return { id:r.id, action:(r.action||'').toUpperCase(), sym:r.symbol, conf:r.confidence, sizing:r.sizing, kind:r.analysis_kind||'',
      headline:r.rationale ? r.rationale.split('. ')[0] : '', reason:r.rationale||'', citations:[],
      verdict: oc ? (oc.favorable===true?'favorable':oc.favorable===false?'unfavorable':'pending') : 'pending',
      move: oc && has(oc.return_pct) ? signedPct(oc.return_pct) : '—' };
  });
}
function applyTax(t){ M.tax = t; M.taxYear = t.year; M.taxYears = t.years||[t.year]; }

async function loadAll(){
  try {
    const [pf, hist, an, ords, txns] = await Promise.all([
      jget('/api/portfolio'), jget('/api/history?range=all'), jget('/api/analyst'),
      jget('/api/orders').catch(()=>[]), jget('/api/transactions').catch(()=>[]),
      loadMarket(), // independent overview widget — load in parallel, don't block first paint
    ]);
    applyPortfolio(pf); applyHistory(hist); applyAnalyst(an); applyOrders(ords); applyTxns(txns);
    try { applyTax(await jget('/api/taxes' + (M.taxYear?('?year='+M.taxYear):''))); } catch(e){}
    loadSplits();
    try { const pl=await jget('/api/portfolios'); M.portfolios=pl.portfolios||[]; M.activePortfolio=pl.active||M.activePortfolio; } catch(e){}
    await loadWatchlists();
    M.ready = true; render();
  } catch(e){ console.error(e); toast('LOAD FAILED — is the server up?'); }
}
async function refreshSilent(){
  try {
    const [pf, ords] = await Promise.all([ jget('/api/portfolio'), jget('/api/orders').catch(()=>M.orders) ]);
    applyPortfolio(pf); if(Array.isArray(ords)) applyOrders(ords); render();
  } catch(e){}
}

//================================================================ websocket (live portfolio stream)
let ws=null, pollTimer=null;
function connect(){
  try {
    ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/api/ws');
    ws.onmessage = (e) => { try { applyPortfolio(JSON.parse(e.data)); render(); } catch(err){} };
    ws.onopen = () => { if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } };
    ws.onclose = () => { if(!pollTimer) pollTimer = setInterval(refreshSilent, 15000); setTimeout(connect, 3000); };
  } catch(e){ if(!pollTimer) pollTimer = setInterval(refreshSilent, 15000); }
}

//================================================================ derived
function allocSlices(){
  const COLORS = ['#E6A93E','#2FBF71','#4A9EE0','#A877E0','#0E9AA8','#FF5C57','#7E8898'];
  const held = M.positions.filter(p=>p.value!=null && p.value>0).sort((a,b)=>b.value-a.value);
  const tot = held.reduce((a,p)=>a+p.value,0) || 1;
  return held.map((p,i)=>({ sym:p.sym, frac:p.value/tot, color:COLORS[Math.min(i,COLORS.length-1)] }));
}
function drawdownPct(){
  if(!M.hist.length) return 0;
  const peak = M.hist.reduce((a,p)=>Math.max(a,num(p.equity)),-Infinity);
  return peak>0 ? Math.max(0,(peak-M.equity)/peak*100) : 0;
}
function sigBadges(sig){
  if(!sig) return [];
  const out=[];
  if(has(sig.rsi14)) out.push({ text:'RSI '+sig.rsi14, color: sig.rsi14>=70?DN:sig.rsi14<=30?UP:C.gray, title:'RSI(14)' });
  if(has(sig.vs_sma50_pct)){ const v=num(sig.vs_sma50_pct); out.push({ text:(v>=0?'▲':'▼')+'50d '+Math.abs(v)+'%', color:v>=0?UP:DN, title:'vs 50-day SMA' }); }
  if(has(sig.drawdown_pct) && num(sig.drawdown_pct)>=20) out.push({ text:'DD '+sig.drawdown_pct+'%', color:DN, title:'max drawdown' });
  return out;
}

// STAGE BUY / STAGE SELL on a position row. These open PAPER orders (a
// simulated account), NOT trades against the tracked holding shown — so the
// SELL is gated on the PAPER position and explains itself when the paper
// account is flat in that symbol (the common case for imported holdings).
function stageBtns(sym, fs, pad){
  const paperHeld = (M.paperPositions && has(M.paperPositions[sym])) ? num(M.paperPositions[sym]) : 0;
  const buyT = 'Stage a PAPER buy of ' + sym + ' (simulated account — separate from your tracked holdings)';
  const sellT = paperHeld > 0
    ? 'Stage a PAPER sell of ' + sym + ' (paper account holds ' + qtyFmt(paperHeld) + ')'
    : 'Paper account holds 0 ' + sym + ' — STAGE BUY to open a paper position first (this does NOT sell your tracked holding)';
  const sellLive = paperHeld > 0;
  return '<button data-act="add" data-arg="' + esc(sym) + '" data-stop="1" title="' + esc(buyT) + '" style="font-family:inherit;font-size:' + fs + ';font-weight:600;color:' + UP + ';background:rgba(47,191,113,0.1);border:1px solid rgba(47,191,113,0.35);border-radius:3px;padding:' + pad + ';cursor:pointer;white-space:nowrap;">STAGE BUY</button>' +
    '<button data-act="trim" data-arg="' + esc(sym) + '" data-stop="1" title="' + esc(sellT) + '" style="font-family:inherit;font-size:' + fs + ';font-weight:600;color:' + DN + ';background:rgba(255,92,87,' + (sellLive ? '0.1' : '0.04') + ');border:1px solid rgba(255,92,87,' + (sellLive ? '0.35' : '0.18') + ');border-radius:3px;padding:' + pad + ';cursor:pointer;white-space:nowrap;opacity:' + (sellLive ? '1' : '0.55') + ';">STAGE SELL</button>';
}

//================================================================ SVG chart builders (ported from the design's hand-drawn charts)
function attrs(o){ const map={strokeWidth:'stroke-width',strokeDasharray:'stroke-dasharray',strokeOpacity:'stroke-opacity',fillOpacity:'fill-opacity',stopColor:'stop-color',stopOpacity:'stop-opacity'};
  return Object.keys(o).map(k=>{ const key=map[k]||k; return key+'="'+esc(o[k])+'"'; }).join(' '); }
function el(tag,o,inner){ return '<'+tag+' '+attrs(o)+'>'+(inner||'')+'</'+tag+'>'; }

function buildEquity(points, W, H, hoverIdx){
  if(!points || points.length<2) return '<div style="height:'+H+'px;display:flex;align-items:center;justify-content:center;color:'+C.faint+';font-size:11px;">no equity history yet — add a transaction</div>';
  const PAD=8;
  const eq=points.map(p=>num(p.equity)), bm=points.map(p=>p.benchmark==null?null:num(p.benchmark)), dep=points.map(p=>num(p.net_deposited));
  const bmv=bm.filter(v=>v!=null);
  const all=[...eq,...bmv,...dep];
  const min=all.reduce((a,v)=>Math.min(a,v),Infinity), max=all.reduce((a,v)=>Math.max(a,v),-Infinity);
  const span=(max-min)||1, n=points.length;
  const x=i=>PAD+(i/(n-1))*(W-2*PAD), y=v=>H-PAD-((v-min)/span)*(H-2*PAD);
  const line=vals=>vals.map((v,i)=>v==null?null:((i&&vals[i-1]!=null?'L':'M')+' '+x(i).toFixed(1)+' '+y(v).toFixed(1))).filter(Boolean).join(' ');
  const fillTo=y(Math.min(Math.max(0,min),max));
  let k='';
  for(let i=1;i<4;i++){ const gy=PAD+i/4*(H-2*PAD); k+=el('line',{x1:PAD,y1:gy,x2:W-PAD,y2:gy,stroke:C.grid,strokeWidth:1}); }
  k+=el('path',{d:line(eq)+' L '+x(n-1).toFixed(1)+' '+fillTo+' L '+x(0).toFixed(1)+' '+fillTo+' Z',fill:'url(#eqg)',stroke:'none'});
  k+=el('path',{d:line(dep),stroke:'#2C3440',strokeWidth:1.3,fill:'none',strokeDasharray:'2 4'});
  if(bmv.length) k+=el('path',{d:line(bm),stroke:C.gray,strokeWidth:1.3,fill:'none',strokeDasharray:'5 4'});
  k+=el('path',{d:line(eq),stroke:C.amber,strokeWidth:2,fill:'none'});
  if(hoverIdx!=null && points[hoverIdx]){ const hx=x(hoverIdx);
    k+=el('line',{x1:hx,y1:PAD,x2:hx,y2:H-PAD,stroke:'#9BA5B4',strokeWidth:1,strokeDasharray:'2 2',opacity:0.6});
    [['e',eq,C.amber],['b',bm,C.gray],['d',dep,'#2C3440']].forEach(t=>{ if(t[1][hoverIdx]==null) return; const dy=y(t[1][hoverIdx]); k+=el('rect',{x:hx-2.4,y:dy-2.4,width:4.8,height:4.8,fill:t[2],stroke:C.bg,strokeWidth:0.6}); }); }
  const defs='<defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">'+el('stop',{offset:'0%',stopColor:C.amber,stopOpacity:0.14})+el('stop',{offset:'100%',stopColor:C.amber,stopOpacity:0})+'</linearGradient></defs>';
  return '<svg id="eqchart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:'+H+'px;display:block;cursor:crosshair;">'+defs+k+'</svg>';
}

function buildCandle(candles, W, H, opts){
  opts=opts||{}; const hoverIdx=opts.hoverIdx, markers=opts.markers||[], avg=opts.avg, showVolume=opts.showVolume;
  if(!candles || candles.length<2) return '<div style="height:'+H+'px;display:flex;align-items:center;justify-content:center;color:'+C.faint+';font-size:11px;">no candle data for this symbol</div>';
  const PAD=8;
  const VOLH=showVolume?Math.round(H*0.2):0, priceBot=H-PAD-VOLH;
  const highs=candles.map(c=>c.h), lows=candles.map(c=>c.l);
  const min=lows.reduce((a,v)=>Math.min(a,v),Infinity), max=highs.reduce((a,v)=>Math.max(a,v),-Infinity);
  const span=(max-min)||1, n=candles.length, slot=(W-2*PAD)/n, bw=Math.max(1.5,slot*0.62);
  const y=v=>priceBot-((v-min)/span)*(priceBot-PAD);
  const sma=candles.map((_,i)=>{ if(i<19) return null; let s=0; for(let k=i-19;k<=i;k++) s+=candles[k].c; return s/20; });
  const smaPath=sma.map((v,i)=>v==null?null:((sma[i-1]==null?'M':'L')+' '+(PAD+slot*i+slot/2).toFixed(1)+' '+y(v).toFixed(1))).filter(Boolean).join(' ');
  let k='';
  for(let i=1;i<4;i++){ const gy=PAD+i/4*(priceBot-PAD); k+=el('line',{x1:PAD,y1:gy,x2:W-PAD,y2:gy,stroke:C.grid,strokeWidth:1}); }
  if(showVolume){ const maxV=candles.reduce((a,c)=>Math.max(a,c.v||0),0)||1;
    candles.forEach((c,i)=>{ const cx=PAD+slot*i+slot/2, up=c.c>=c.o, bh=Math.max(1,((c.v||0)/maxV)*(VOLH-6));
      k+=el('rect',{x:cx-bw/2,y:H-PAD-bh,width:bw,height:bh,fill:up?UP:DN,opacity:0.3}); });
    k+=el('line',{x1:PAD,y1:priceBot+3,x2:W-PAD,y2:priceBot+3,stroke:C.grid,strokeWidth:1}); }
  candles.forEach((c,i)=>{ const cx=PAD+slot*i+slot/2, up=c.c>=c.o, col=up?UP:DN;
    k+=el('line',{x1:cx,y1:y(c.h),x2:cx,y2:y(c.l),stroke:col,strokeWidth:1});
    const top=y(Math.max(c.o,c.c)), hh=Math.max(1,y(Math.min(c.o,c.c))-top);
    k+=el('rect',{x:cx-bw/2,y:top,width:bw,height:hh,fill:col}); });
  if(smaPath) k+=el('path',{d:smaPath,stroke:C.blue,strokeWidth:1.2,fill:'none',opacity:0.85});
  if(avg!=null && avg>=min && avg<=max){ const ay=y(avg); k+=el('line',{x1:PAD,y1:ay,x2:W-PAD,y2:ay,stroke:C.purple,strokeWidth:1,strokeDasharray:'5 3',opacity:0.65}); }
  const lastY=y(candles[n-1].c); k+=el('line',{x1:PAD,y1:lastY,x2:W-PAD,y2:lastY,stroke:C.amber,strokeWidth:1,strokeDasharray:'3 3',opacity:0.55});
  markers.forEach(mk=>{ const cx=PAD+slot*mk.idx+slot/2, my=y(mk.price), up=mk.side==='buy', col=up?UP:DN, sz=5;
    const pts=up?(cx+','+(my+4)+' '+(cx-sz)+','+(my+4+sz*1.6)+' '+(cx+sz)+','+(my+4+sz*1.6)):(cx+','+(my-4)+' '+(cx-sz)+','+(my-4-sz*1.6)+' '+(cx+sz)+','+(my-4-sz*1.6));
    k+=el('polygon',{points:pts,fill:col,stroke:C.bg,strokeWidth:0.6}); });
  if(hoverIdx!=null && candles[hoverIdx]){ const cx=PAD+slot*hoverIdx+slot/2;
    k+=el('rect',{x:cx-slot/2,y:PAD,width:slot,height:H-2*PAD,fill:C.amber,opacity:0.08});
    k+=el('line',{x1:cx,y1:PAD,x2:cx,y2:H-PAD,stroke:'#9BA5B4',strokeWidth:1,strokeDasharray:'2 2',opacity:0.75}); }
  return '<svg id="candlechart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:'+H+'px;display:block;cursor:crosshair;">'+k+'</svg>';
}

function buildDonut(slices, size){
  const Sz=size||128, inset=Math.round(Sz*0.16);
  if(!slices.length) return '<div style="width:'+Sz+'px;height:'+Sz+'px;border-radius:50%;border:1px dashed '+C.border+';"></div>';
  let acc=0; const stops=[];
  slices.forEach(s=>{ const a=acc, b=acc+s.frac*100; stops.push(s.color+' '+a.toFixed(2)+'% '+b.toFixed(2)+'%'); acc=b; });
  return '<div style="position:relative;width:'+Sz+'px;height:'+Sz+'px;flex-shrink:0;">'+
    '<div style="width:100%;height:100%;border-radius:50%;background:conic-gradient('+stops.join(', ')+');"></div>'+
    '<div style="position:absolute;inset:'+inset+'px;border-radius:50%;background:'+C.bg+';display:flex;flex-direction:column;align-items:center;justify-content:center;">'+
      '<div style="font-size:'+(Sz>200?12:9)+'px;color:'+C.label+';letter-spacing:1px;">POS</div>'+
      '<div style="font-size:'+(Sz>200?36:20)+'px;font-weight:600;color:'+C.text+';">'+slices.length+'</div></div></div>';
}

//================================================================ ticket math (pre-trade summary + guardrail warnings, UX only)
const MAX_NOTIONAL=10000, MAX_POS_PCT=25;
function ticket(){
  const symU=(S.tSym||'').toUpperCase();
  const livePos=M.positions.find(p=>p.sym===symU);
  const watched=M.watchlist.find(w=>w.sym===symU);
  // Price is a global quote (live feed/last close); cost basis comes from
  // whichever ledger we trade against, but the reference price is the same.
  const refPx = livePos&&livePos.price!=null ? livePos.price : (watched&&watched.price!=null ? watched.price : 0);
  const qty=parseFloat(S.tQty)||0;
  const px = S.otype==='limit' && S.tLimit ? (parseFloat(S.tLimit)||0) : refPx;
  const estCost=qty*px;
  // Orders execute on the PAPER account, which is segregated from the tracked
  // (live) portfolio — so size buying power / oversell / position cap against
  // it. Fall back to the live portfolio only before the paper account loads.
  const paperKnown = M.paperBuyingPower!=null || (M.paperPositions && Object.keys(M.paperPositions).length>0);
  const cash = M.paperBuyingPower!=null ? M.paperBuyingPower : M.cash;
  // Keep the position-cap denominator on the SAME ledger as `cash`: use paper
  // equity when the paper account is loaded, otherwise live — never mix a
  // paper cost estimate against a live equity denominator.
  const equity = M.paperEquity!=null ? M.paperEquity : (paperKnown ? null : M.equity);
  const heldQty = (M.paperPositions && has(M.paperPositions[symU])) ? num(M.paperPositions[symU]) : (paperKnown ? 0 : (livePos?livePos.qty:0));
  const heldVal = heldQty*refPx;
  const held = heldQty>0 ? { qty:heldQty, avg:(paperKnown?null:(livePos?livePos.avg:0)) } : null;
  const warns=[]; let canPlace=qty>0 && px>0, blockMsg='';
  if(qty<=0) canPlace=false;
  if(S.side==='sell'){
    if(qty>heldQty){ canPlace=false; blockMsg='Oversell: only '+qtyFmt(heldQty)+' held'; warns.push({text:'✕ exceeds held qty ('+qtyFmt(heldQty)+')',color:DN}); }
  } else {
    if(estCost>cash){ canPlace=false; warns.push({text:'✕ over buying power by '+money(estCost-cash),color:DN}); }
    if(estCost>MAX_NOTIONAL) warns.push({text:'⚠ exceeds max notional '+money(MAX_NOTIONAL),color:AM});
    if(equity!=null && equity>0 && (heldVal+estCost)/equity>MAX_POS_PCT/100) warns.push({text:'⚠ position would exceed '+MAX_POS_PCT+'% cap',color:AM});
  }
  const bpAfter = S.side==='buy' ? cash-estCost : cash+estCost;
  return { symU, held, heldQty, qty, px, estCost, bpAfter, warns, canPlace, blockMsg };
}

//================================================================ candles (fetch + cache) for the selected symbol
async function ensureCandles(sym){
  if(!sym || M.candleCache[sym]) return;
  M.candleCache[sym] = 'loading';
  try {
    const j = await jget('/api/candles?symbol='+encodeURIComponent(sym)+'&days=252');
    M.candleCache[sym] = (j.candles||[]).map(c=>({ date:c.date, o:num(c.o), h:num(c.h), l:num(c.l), c:num(c.c), v:num(c.v) }));
  } catch(e){ M.candleCache[sym] = []; }
  render();
}
function selectedCandles(){
  const sym=S.selSym; if(!sym) return null;
  const cached=M.candleCache[sym];
  if(cached==null){ ensureCandles(sym); return 'loading'; }
  if(cached==='loading') return 'loading';
  if(!cached.length) return [];
  const RANGE={ '1m':22,'3m':66,'6m':132,'1y':252 };
  const N=RANGE[S.candleRange]||132;
  let arr=cached.slice(-N).map(c=>({...c}));
  // pin the last candle to the live price (matches the design).
  const pos=M.positions.find(p=>p.sym===sym);
  if(pos && pos.price!=null && arr.length){ const last={...arr[arr.length-1]}; last.c=pos.price; last.h=Math.max(last.h,pos.price); last.l=Math.min(last.l,pos.price); arr[arr.length-1]=last; }
  return arr;
}
function fillMarkers(sym, arr){
  if(!arr || !arr.length) return [];
  const fills=M.txns.filter(t=>t.sym===sym && (t.kind==='buy'||t.kind==='sell'));
  const byDate={}; arr.forEach((c,i)=>{ byDate[c.date]=i; });
  const markers=[];
  fills.forEach(t=>{
    const d=(t.ts||'').slice(0,10);
    let idx = byDate[d];
    if(idx==null){ // nearest by date string
      for(let i=arr.length-1;i>=0;i--){ if(arr[i].date<=d){ idx=i; break; } }
    }
    if(idx!=null) markers.push({ idx, price:t.price, side:t.kind });
  });
  return markers;
}

function eqHoverTip(){
  if(S.eqHoverIdx==null || !M.hist[S.eqHoverIdx]) return '';
  const hp=M.hist[S.eqHoverIdx];
  // Match buildEquity's x() mapping exactly (PAD=8 inset in a 1000-wide
  // viewBox scaled to fill width) so the tooltip lands on the in-chart
  // crosshair + marker. The crosshair line itself is drawn ONCE, inside the
  // SVG — no second overlay line here (that caused the split-line artifact).
  // Crosshair sits at the true x (drawn in-SVG); the tooltip BOX is clamped to
  // [8%,92%] so it never spills off the panel edge at the first/last point.
  const n=M.hist.length, fx=8+(n>1?S.eqHoverIdx/(n-1):0)*(1000-16), left=Math.max(8,Math.min(92,fx/1000*100)).toFixed(2)+'%';
  const row=(l,v,c1,c2)=>'<div style="display:flex;justify-content:space-between;gap:16px;font-size:10.5px;line-height:1.6;"><span style="color:'+c1+';">'+l+'</span><span style="color:'+(c2||C.text)+';">'+v+'</span></div>';
  return '<div style="position:absolute;top:4px;left:'+left+';transform:translateX(-50%);pointer-events:none;z-index:6;background:'+C.bg+';border:1px solid #2A323E;border-radius:5px;padding:7px 10px;min-width:132px;box-shadow:0 8px 24px rgba(0,0,0,0.6);">'+
    '<div style="font-size:10px;color:'+C.body+';margin-bottom:5px;">'+esc(hp.date||'')+'</div>'+row('EQUITY',money(hp.equity),C.amber)+row('SPY',hp.benchmark!=null?money(hp.benchmark):'—','#8A93A6')+row('DEPOSITED',money(hp.net_deposited),C.gray,'#9BA5B4')+'</div>';
}

function equityPanel(H){
  const chart=buildEquity(M.hist, 1000, H, S.eqHoverIdx);
  if(!M.hist.length) return chart;
  const eq=M.hist.map(p=>num(p.equity)), bm=M.hist.map(p=>p.benchmark==null?null:num(p.benchmark)), dep=M.hist.map(p=>num(p.net_deposited));
  const all=[...eq,...bm.filter(v=>v!=null),...dep];
  const min=all.reduce((a,v)=>Math.min(a,v),Infinity), max=all.reduce((a,v)=>Math.max(a,v),-Infinity), span=(max-min)||1;
  const topPct=v=>Math.max(4,Math.min(94,(1-(v-min)/span)*100)).toFixed(1)+'%';
  const eqEnd=eq[eq.length-1], spyEnd=bm[bm.length-1], mid=Math.floor(M.hist.length/2);
  const lab=(css,txt)=>'<div style="position:absolute;'+css+';font-size:9px;color:'+C.faint+';pointer-events:none;">'+txt+'</div>';
  return '<div style="position:relative;">'+chart+
    lab('top:2px;left:6px',compact(max))+lab('bottom:15px;left:6px',compact(min))+
    '<div style="position:absolute;right:4px;top:'+topPct(eqEnd)+';transform:translateY(-50%);font-size:9px;font-weight:600;color:'+C.bg+';background:'+C.amber+';padding:1px 5px;border-radius:3px;pointer-events:none;">'+compact(eqEnd)+'</div>'+

    eqHoverTip()+'</div>';
}

// "What needs a decision" — triggered alerts, signal extremes on holdings,
// and open AI recommendations. Each item can link to the relevant view.
function attentionItems(){
  const items=[];
  const CL={ price_below:'≤ $',price_above:'≥ $',drawdown_above:'DD ≥ ' };
  // ALERT = a threshold YOU armed that has fired. SIGNAL = a derived indicator
  // (computed live from prices, never saved). IDEA = an analyst suggestion.
  // The tag makes the source explicit so signals aren't mistaken for alerts.
  M.alerts.filter(a=>a.status==='triggered').forEach(a=>{
    items.push({ icon:'🚨', color:DN, tag:'ALERT', tagColor:DN, act:'view', arg:'alerts',
      text:a.sym+' '+(CL[a.condition]||'')+a.threshold+(a.condition==='drawdown_above'?'%':'')+' — alert triggered'+(has(a.triggeredValue)?(' at '+a.triggeredValue):'') });
  });
  M.positions.forEach(p=>{
    const s=p.signals; if(!s) return; const flags=[];
    const rsi=has(s.rsi14)?num(s.rsi14):null;
    if(rsi!=null && rsi>=70) flags.push('RSI '+s.rsi14+' overbought');
    else if(rsi!=null && rsi<=30) flags.push('RSI '+s.rsi14+' oversold');
    const v50=has(s.vs_sma50_pct)?num(s.vs_sma50_pct):null, v200=has(s.vs_sma200_pct)?num(s.vs_sma200_pct):null;
    if(v50!=null && v200!=null && v50<0 && v200<0) flags.push('below 50d & 200d');
    if(has(s.drawdown_pct) && num(s.drawdown_pct)>=20) flags.push('DD '+s.drawdown_pct+'%');
    if(flags.length) items.push({ icon:'⚠', color:AM, tag:'SIGNAL', tagColor:AM, act:'gotoPos', arg:p.sym, text:p.sym+' — '+flags.join(' · ') });
  });
  const actionable=M.recs.filter(r=>['BUY','TRIM','SELL','ADD'].includes(r.action));
  if(actionable.length){
    const list=actionable.slice(0,3).map(r=>r.action.toLowerCase()+' '+r.sym).join(', ');
    items.push({ icon:'🤖', color:C.blue, tag:'IDEA', tagColor:C.blue, act:'view', arg:'analyst',
      text:actionable.length+' AI trade idea'+(actionable.length===1?'':'s')+(list?(' — '+list+(actionable.length>3?'…':'')):'') });
  }
  return items;
}

async function loadMarket(){ try{ M.gauges = await jget('/api/market'); M.gaugesErr=false; }catch(e){ M.gaugesErr=true; } }
async function marketBrief(){
  if(S.marketBriefing) return;            // guard the double-click window
  S.marketBriefing=true; render();        // disable the button before the await
  try{
    const r=await japi('POST','/api/market/brief'); // errors (disabled/budget/busy) throw → caught
    const id=r.id; toast('AI reading the market…');
    // Poll THIS brief's own analysis row — not the shared global running flag,
    // which any other analyst run (briefing/ideas) could flip.
    let done=false;
    for(let i=0;i<25;i++){
      await new Promise(res=>setTimeout(res,3000));
      let row=null; try{ row=await jget('/api/analyses/'+id); }catch(e){}
      if(row && row.status && row.status!=='running'){ done = row.status==='done'; break; }
    }
    await loadMarket();
    toast(done ? 'MARKET BRIEF READY' : 'Market brief still running — refresh shortly');
  }catch(e){ toast(e.message); }
  finally{ S.marketBriefing=false; render(); }
}

async function loadWatchlists(){
  try{
    const lists = await jget('/api/watchlists'); M.watchlists = lists||[];
    if(!M.watchlists.some(l=>l.id===M.wlActive)) M.wlActive = M.watchlists[0]?M.watchlists[0].id:null;
    await loadWlMembers();
    // Screening (a server-side engine pass) is deferred to when WATCH is open,
    // so it doesn't add round-trips to every boot. Refresh it if already there.
    if(S.view==='watchlist') await loadScreener();
  }catch(e){}
}
async function loadWlMembers(){
  if(M.wlActive==null){ M.wlMembers=[]; return; }
  try{ M.wlMembers = await jget('/api/watchlists/'+M.wlActive)||[]; }catch(e){ M.wlMembers=[]; }
}
async function loadScreener(){
  try{ M.screenerSettings = await jget('/api/screener/settings'); }catch(e){}
  if(M.wlActive==null){ M.ideas={ideas:[],scanned:0,awaiting_data:0}; return; }
  try{ M.ideas = await jget('/api/screener/'+M.wlActive); }catch(e){ M.ideas={ideas:[],scanned:0,awaiting_data:0}; }
}
async function selectWatchlist(id){ M.wlActive=id; await loadWlMembers(); await loadScreener(); render(); }
async function setAggr(kind, level){
  const next=Object.assign({stock:'balanced',etf:'balanced'}, M.screenerSettings); next[kind]=level;
  try{ M.screenerSettings = await japi('PUT','/api/screener/settings', next); await loadScreener(); render(); }
  catch(e){ toast(e.message); }
}
async function analyzeIdeas(){
  if(M.wlActive==null) return;
  try{
    const r=await japi('POST','/api/screener/'+M.wlActive+'/analyze');
    if(!r.started){ toast('No candidates to analyze — loosen aggressiveness or add symbols'); return; }
    S.ideasAnalyzing=true; toast('AI writing theses for '+r.ideas+' ideas…'); render();
    for(let i=0;i<22;i++){ await new Promise(res=>setTimeout(res,3000)); let a={}; try{ a=await jget('/api/analyst'); applyAnalyst(a); }catch(e){} if(a && !a.running) break; }
    S.ideasAnalyzing=false; toast('AI THESES READY'); render();
  }catch(e){ S.ideasAnalyzing=false; toast(e.message); render(); }
}
function stageIdea(sym, action){
  const side=action==='buy'?'buy':'sell';
  if(side==='sell'){
    // A sell idea is a technical SIGNAL on a name you likely don't hold in
    // paper — don't stage a doomed order (same guard as quickTrim).
    const ph=(M.paperPositions && has(M.paperPositions[sym]))?num(M.paperPositions[sym]):0;
    if(ph<=0){ toast('SELL SIGNAL · PAPER holds 0 '+sym+' — nothing to sell (your tracked holding is untouched)'); render(); return; }
  }
  if(addToBasket(side, sym, 1, 'market')) toast('STAGED '+side.toUpperCase()+' '+sym+' → ticket basket (adjust qty)'); render();
}
async function wlAddSymbols(){
  if(M.wlActive==null){ toast('No list selected'); return; }
  const text=(S.wlAddText||'').trim();
  if(!text){ toast('Paste some symbols first'); return; }
  try{
    const r = await japi('POST','/api/watchlists/'+M.wlActive+'/symbols',{symbols:text});
    S.wlAddText='';
    toast('ADDED '+r.added+(r.invalid&&r.invalid.length?(' · skipped '+r.invalid.length+' invalid'):''));
    await loadWatchlists();
    render();
  }catch(e){ toast(e.message); render(); }
}

async function wlRemoveSym(sym){
  if(M.wlActive==null) return;
  try{ await japi('DELETE','/api/watchlists/'+M.wlActive+'/symbols/'+encodeURIComponent(sym)); await loadWatchlists(); render(); }
  catch(e){ toast(e.message); render(); }
}

function alertsView(){
  const cols='1.4fr 0.8fr 1.2fr 1.5fr 1.3fr 0.5fr';
  const CL={ price_below:'≤ $',price_above:'≥ $',drawdown_above:'DD ≥ ' };
  let html=alertCreateForm();
  html+='<div style="display:grid;grid-template-columns:'+cols+';gap:10px;padding:8px 16px;font-size:9.5px;letter-spacing:0.5px;color:'+C.label+';border-bottom:1px solid '+C.border+';"><div>ALERT</div><div>STATUS</div><div>TRIGGERED</div><div>DRAFT ORDER</div><div>NOTE</div><div style="text-align:right;">RE-ARM</div></div>';
  if(!M.alerts.length){ html+='<div style="padding:22px 16px;text-align:center;color:'+C.faint+';font-size:11px;">no alerts set</div>'; }
  else html += M.alerts.map(a=>{
    const sc=a.status==='triggered'?DN:a.status==='active'?UP:'#8A93A6';
    const desc=esc(a.sym)+' '+(CL[a.condition]||'')+esc(a.threshold)+(a.condition==='drawdown_above'?'%':'');
    const trig=has(a.triggeredValue)?(esc(a.triggeredValue)+(a.triggeredTs?' · '+esc((a.triggeredTs||'').slice(0,16).replace('T',' ')):'')):'—';
    const draft=a.draft?esc((a.draft.side||'').toUpperCase()+' '+a.draft.qty+' '+a.draft.order_type+(a.draft.limit_price?' @ '+a.draft.limit_price:'')):'—';
    return '<div style="display:grid;grid-template-columns:'+cols+';gap:10px;padding:11px 16px;border-bottom:1px solid '+C.hairline+';align-items:center;font-size:12px;"><div style="font-weight:600;color:'+C.bright+';">'+desc+'</div>'+
      '<div style="color:'+sc+';font-size:10px;letter-spacing:0.5px;">'+esc(a.status)+'</div><div style="color:'+C.label+';">'+trig+'</div><div style="color:'+C.body+';">'+draft+'</div><div style="color:'+C.label+';">'+(esc(a.note)||'—')+'</div>'+
      '<div style="text-align:right;display:flex;gap:8px;justify-content:flex-end;align-items:center;"><button data-act="rearmAlert" data-arg="'+esc(a.id)+'" aria-label="Re-arm alert" title="Re-arm" style="background:none;border:none;color:'+C.label+';cursor:pointer;font-size:13px;padding:0;">↻</button><button data-act="deleteAlert" data-arg="'+esc(a.id)+'" aria-label="Delete alert" title="Delete alert" style="background:none;border:none;color:'+C.faint+';cursor:pointer;font-size:12px;padding:0;line-height:1;">✕</button></div></div>';
  }).join('');
  html += '<div style="padding:12px 16px;font-size:10.5px;color:'+C.label+';line-height:1.55;">Alerts carry an optional pre-staged draft order. When the condition fires it surfaces in the banner above with a one-click <span style="color:'+C.amber+';">REVIEW TICKET</span> — the order still routes through the docked ticket and your confirm.</div>';
  return html;
}

// The raw transaction ledger — every recorded entry (manual, CSV import, and
// broker fills), the source of truth behind positions/taxes. All server-sourced
// fields go through esc(). Delete uses a two-click arm/confirm so a stray click
// can't drop a holding; the server still rejects deletes that break replay.
function ledgerView(){
  const cols='1fr 0.8fr 0.7fr 0.7fr 0.85fr 0.7fr 0.6fr 1.5fr 0.55fr';
  const KC={ buy:UP, sell:DN, dividend:C.blue, deposit:C.green, withdrawal:DN, split:C.purple };
  const shareKind=k=>k==='buy'||k==='sell'||k==='split';
  let html='<div style="padding:11px 16px 9px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid '+C.border+';"><span style="font-size:11px;letter-spacing:1px;color:'+C.body+';">TRANSACTION LEDGER <span style="color:'+C.faint+';">· '+M.txns.length+' ENTRIES · MANUAL · CSV · BROKER FILLS</span></span>'+
    '<button data-act="importOpen" style="font-size:10px;color:'+C.text+';background:transparent;border:1px solid '+C.border+';border-radius:3px;padding:6px 10px;cursor:pointer;font-family:inherit;">⬆ IMPORT CSV</button></div>'+
    '<div style="display:grid;grid-template-columns:'+cols+';gap:8px;padding:8px 16px;font-size:9.5px;letter-spacing:0.5px;color:'+C.label+';border-bottom:1px solid '+C.border+';"><div>WHEN</div><div>TYPE</div><div>SYMBOL</div><div style="text-align:right;">QTY</div><div style="text-align:right;">PRICE</div><div style="text-align:right;">FEES</div><div>MODE</div><div>NOTE</div><div style="text-align:right;">DEL</div></div>';
  if(!M.txns.length){ html+='<div style="padding:22px 16px;text-align:center;color:'+C.faint+';font-size:11px;">no transactions yet — stage a buy in the ticket, or ⬆ IMPORT CSV</div>'; return html; }
  html += M.txns.map(t=>{
    const armed=S.confirmDelTx==t.id;
    return '<div style="display:grid;grid-template-columns:'+cols+';gap:8px;padding:10px 16px;border-bottom:1px solid '+C.hairline+';font-size:11.5px;align-items:center;font-variant-numeric:tabular-nums;">'+
      '<div style="color:'+C.label+';">'+esc(t.ts)+'</div>'+
      '<div style="color:'+(KC[t.kind]||C.body)+';font-size:10px;letter-spacing:0.5px;">'+esc((t.kind||'').toUpperCase())+'</div>'+
      '<div style="font-weight:600;color:'+C.bright+';">'+(t.sym?esc(t.sym):'—')+'</div>'+
      '<div style="text-align:right;color:'+C.body+';">'+(shareKind(t.kind)?qtyFmt(t.qty):'—')+'</div>'+
      '<div style="text-align:right;color:'+C.body+';">'+money(t.price)+'</div>'+
      '<div style="text-align:right;color:'+(t.fees?C.body:C.faint)+';">'+(t.fees?money(t.fees):'—')+'</div>'+
      '<div style="font-size:9px;letter-spacing:0.5px;color:'+(t.mode==='paper'?AM:C.label)+';">'+esc((t.mode||'live').toUpperCase())+'</div>'+
      '<div style="color:'+C.label+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="'+esc(t.note)+'">'+(esc(t.note)||'—')+'</div>'+
      '<div style="text-align:right;"><button data-act="delTx" data-arg="'+esc(t.id)+'" aria-label="'+(armed?'Confirm delete transaction':'Delete transaction')+'" style="background:'+(armed?'rgba(255,92,87,0.15)':'none')+';border:1px solid '+(armed?DN:'#1A212B')+';color:'+DN+';cursor:pointer;font-size:'+(armed?'9':'11')+'px;line-height:1;padding:'+(armed?'4px 7px':'4px 8px')+';border-radius:3px;font-family:inherit;'+(armed?'font-weight:600;letter-spacing:0.5px;':'')+'">'+(armed?'CONFIRM':'✕')+'</button></div>'+
    '</div>';
  }).join('');
  html += '<div style="padding:12px 16px;font-size:10px;color:'+C.label+';line-height:1.55;">Every recorded transaction across all modes. <span style="color:'+AM+';">PAPER</span> rows are broker fills, segregated from the live tracked portfolio. A delete that would break the replay (e.g. an oversell) is rejected.</div>';
  return html;
}

      '<div style="color:'+C.label+';">'+esc(r.acquired)+'</div><div style="color:'+C.label+';">'+esc(r.sold)+'</div>'+
      '<div style="text-align:right;color:'+C.body+';">'+money(r.proceeds)+'</div><div style="text-align:right;color:'+C.body+';">'+money(r.basis)+'</div>'+
      '<div style="text-align:right;color:'+dirColor(g)+';">'+signedMoney(g)+'</div>'+

function dock(){
  // Collapsed: a slim rail on the right edge with the working-order count and
  // a one-click / hotkey (T) reopen.
  if(!S.dockOpen){
    const openN=M.orders.filter(o=>['accepted','partially_filled','pending_submit'].includes(o.status)).length;
    return '<aside aria-label="Order ticket (collapsed)" style="display:flex;flex-direction:column;align-items:center;background:'+C.panel2+';border-left:1px solid '+C.border+';min-height:0;">'+
      '<button data-act="toggleDock" title="Open order ticket (T)" aria-label="Open order ticket" aria-expanded="false" style="width:100%;padding:11px 0;background:transparent;border:none;border-bottom:1px solid '+C.border+';color:'+C.amber+';font-size:15px;cursor:pointer;">‹</button>'+
      '<button data-act="toggleDock" title="Open order ticket (T)" style="flex:1;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:transparent;border:none;cursor:pointer;">'+
        '<span style="writing-mode:vertical-rl;font-size:10px;letter-spacing:2px;color:'+C.label+';white-space:nowrap;">ORDER TICKET</span>'+
        (openN?'<span style="writing-mode:vertical-rl;font-size:10px;letter-spacing:1px;color:'+C.amber+';">'+openN+' WORKING</span>':'')+
      '</button>'+
      '<div style="padding:10px 0;font-size:9px;letter-spacing:1px;color:'+C.faint+';">T</div>'+
    '</aside>';
  }
  const t=ticket();
  const segBtn=(act,label,on,onColor,size,extra)=>'<button data-act="'+act+'" style="padding:'+(size||9)+'px;font-family:inherit;font-size:'+(size===8?10:11)+'px;font-weight:600;letter-spacing:1px;border:none;cursor:pointer;background:'+(on.bg)+';color:'+(on.color)+';'+(extra||'')+'">'+label+'</button>';
  const buyOn={ bg:S.side==='buy'?'rgba(47,191,113,0.16)':'transparent', color:S.side==='buy'?UP:C.label };
  const sellOn={ bg:S.side==='sell'?'rgba(255,92,87,0.16)':'transparent', color:S.side==='sell'?DN:C.label };
  const mktOn={ bg:S.otype==='market'?'#1A212B':'transparent', color:S.otype==='market'?C.bright:C.label };
  const limOn={ bg:S.otype==='limit'?'#1A212B':'transparent', color:S.otype==='limit'?C.bright:C.label };
  const stageOk = !!t.symU && t.qty>0;
  const warns=t.warns.map(w=>'<div style="font-size:10.5px;color:'+w.color+';line-height:1.4;">'+esc(w.text)+'</div>').join('');
  const input=(id,val,label,ph)=>'<div><div style="font-size:9.5px;letter-spacing:1px;color:'+C.label+';margin-bottom:5px;">'+label+'</div><input id="'+id+'" value="'+esc(val)+'"'+(ph?' placeholder="'+ph+'"':'')+' style="width:100%;background:'+C.bg+';border:1px solid '+C.border+';border-radius:4px;color:'+C.bright+';font-family:inherit;font-size:13px;padding:9px 10px;outline:none;"></div>';

  let ticketHtml='<div style="padding:14px 16px;border-bottom:1px solid '+C.border+';">'+

    '<div style="font-size:10px;color:'+C.faint+';line-height:1.45;margin-bottom:12px;padding:7px 9px;background:rgba(199,162,75,0.07);border:1px solid rgba(199,162,75,0.25);border-radius:4px;">Simulated <b style="color:'+AM+';">paper</b> account — separate from your tracked holdings on the left. Practice trades here; fills never change your imported positions.</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid '+C.border+';border-radius:4px;overflow:hidden;margin-bottom:8px;">'+segBtn('setBuy','BUY',buyOn)+segBtn('setSell','SELL',sellOn,null,null,'border-left:1px solid '+C.border+';')+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid '+C.border+';border-radius:4px;overflow:hidden;margin-bottom:12px;">'+segBtn('setMkt','MARKET',mktOn,null,8)+segBtn('setLim','LIMIT',limOn,null,8,'border-left:1px solid '+C.border+';')+'</div>'+

      '<div style="display:flex;justify-content:space-between;font-size:11.5px;"><span style="color:'+C.label+';">EST COST</span><span style="color:'+C.text+';font-variant-numeric:tabular-nums;">'+money(t.estCost)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:11.5px;"><span style="color:'+C.label+';">BP AFTER</span><span style="color:'+(t.bpAfter<0?DN:C.text)+';font-variant-numeric:tabular-nums;">'+money(t.bpAfter)+'</span></div>'+warns+'</div>'+

  // The basket: every staged order, then one PLACE ALL submits them.
  let basketHtml='';
  if(S.basket.length){
    let buyCost=0, sellProceeds=0;
    const rows=S.basket.map((b,i)=>{ const px=basketRefPx(b), cost=b.qty*px; if(b.side==='buy') buyCost+=cost; else sellProceeds+=cost;

        '<div style="min-width:0;"><span style="color:'+(b.side==='buy'?UP:DN)+';font-weight:600;">'+esc(b.side.toUpperCase())+'</span> <span style="color:'+C.bright+';font-weight:600;">'+esc(b.sym)+'</span> <span style="color:'+C.label+';">'+qtyFmt(b.qty)+'</span> <span style="color:'+C.faint+';font-size:10px;">'+esc(b.otype)+((b.otype==='limit'&&b.limit)?(' @'+money(b.limit)):'')+'</span></div>'+

    const cashBase=(M.paperBuyingPower!=null?M.paperBuyingPower:M.cash), bpAfter=cashBase-buyCost+sellProceeds, overBP=buyCost>cashBase;
    const canAll=!S.halted && M.tradingEnabled;
    const allLabel=S.halted?'TRADING HALTED':(!M.tradingEnabled?'NO BROKER (PAPER KEYS)':'PLACE ALL ('+S.basket.length+') // PAPER');
    basketHtml='<div style="border-bottom:1px solid '+C.border+';background:'+C.bg+';">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px 8px;"><span style="font-size:11px;letter-spacing:1px;color:'+C.body+';">TICKET BASKET <span style="color:'+C.amber+';">'+S.basket.length+'</span></span>'+
        '<button data-act="clearBasket" style="font-family:inherit;font-size:9.5px;letter-spacing:0.5px;color:'+C.label+';background:transparent;border:1px solid #1A212B;border-radius:3px;padding:4px 9px;cursor:pointer;">⊘ CLEAR</button></div>'+

//================================================================ chart hover wiring (post-render)
// Both the inline AND the expanded overlay chart share id="eqchart" /
// "candlechart", so wire EVERY instance (getElementById would only catch the
// first/inline one — that's why the expanded chart's crosshair didn't track
// the mouse). Index math mirrors the SVG x() mapping (PAD=8 inset in a
// 1000-wide viewBox) so the crosshair lands under the cursor.
const CHART_W=1000, CHART_PAD=8, CHART_INNER=CHART_W-2*CHART_PAD;
function wireCharts(){
  document.querySelectorAll('[id="eqchart"]').forEach(eq=>{
    eq.onmousemove=(e)=>{ const r=eq.getBoundingClientRect(); const f=(e.clientX-r.left)/r.width;
      let i=Math.round((f*CHART_W-CHART_PAD)/CHART_INNER*(M.hist.length-1)); i=Math.max(0,Math.min(M.hist.length-1,i));
      if(i!==S.eqHoverIdx){ S.eqHoverIdx=i; render(); } };
    eq.onmouseleave=()=>{ if(S.eqHoverIdx!=null){ S.eqHoverIdx=null; render(); } };
  });
  const arr=selectedCandles(); const n=(Array.isArray(arr)?arr.length:0);
  document.querySelectorAll('[id="candlechart"]').forEach(cc=>{
    cc.onmousemove=(e)=>{ if(n===0) return; const r=cc.getBoundingClientRect(); const f=(e.clientX-r.left)/r.width;
      let i=Math.floor((f*CHART_W-CHART_PAD)/CHART_INNER*n); i=Math.max(0,Math.min(n-1,i));
      if(i!==S.hoverIdx){ S.hoverIdx=i; render(); } };
    cc.onmouseleave=()=>{ if(S.hoverIdx!=null){ S.hoverIdx=null; render(); } };
  });
}

//================================================================ actions
function toast(msg){ S.toast=msg; S.announce=msg; render(); clearTimeout(toast._t); toast._t=setTimeout(()=>{ S.toast=''; render(); }, 3200); }
function setView(v){ S.view=v; S.hoverIdx=null; S.confirmDelTx=null; render(); if(v==='ledger') reloadTxns(); if(v==='watchlist') loadScreener().then(render); }
// The order ticket is a BASKET: stage many, then PLACE ALL. Every "stage" path
// — position STAGE buttons, command bar, analyst, alerts, manual compose —
// accumulates here. Same symbol+side+type+limit merges (qty summed).
function addToBasket(side,sym,qty,otype,limit){
  sym=(sym||'').toUpperCase(); qty=parseFloat(qty)||0; otype=otype||'market'; limit=(limit!=null&&limit!=='')?String(limit):'';
  if(!sym || qty<=0){ toast('Nothing to stage — symbol + qty required'); return false; }
  const ex=S.basket.find(b=>b.sym===sym && b.side===side && b.otype===otype && String(b.limit)===String(limit));
  if(ex){ ex.qty=Math.round((ex.qty+qty)*10000)/10000; } else { S.basket.push({side,sym,qty,otype,limit}); }
  S.dockOpen=true; return true;
}
function quickAdd(sym){ const p=M.positions.find(x=>x.sym===sym); const q=p?Math.max(1,Math.round(p.qty*0.25)):1; if(addToBasket('buy',sym,q,'market')) toast('STAGED BUY '+q+' '+sym+' → ticket basket'); render(); }
function quickTrim(sym){
  // STAGE SELL stages a PAPER sell — size it off the PAPER position, not the
  // tracked holding. If the paper account is flat in this name (the usual case
  // for imported holdings), say so instead of staging a doomed long-only sell.
  const ph=(M.paperPositions && has(M.paperPositions[sym]))?num(M.paperPositions[sym]):0;
  if(ph<=0){ toast('PAPER account holds 0 '+sym+' — STAGE BUY to open a paper position first (your tracked holding is untouched)'); return; }
  const q=Math.max(0.0001,Math.round(ph*0.25*10000)/10000);
  if(addToBasket('sell',sym,q,'market')) toast('STAGED SELL '+qtyFmt(q)+' '+sym+' → ticket basket'); render();
}
function loadSym(sym){ sym=(sym||'').toUpperCase(); S.tSym=sym; S.view='positions'; if(M.positions.find(p=>p.sym===sym)) S.selSym=sym; toast('LOADED '+sym+' INTO TICKET'); }
function runCmd(raw){
  const str=(raw||'').trim(); if(!str) return;
  const tok=str.split(/\s+/); const sideMap={ b:'buy',buy:'buy',s:'sell',sell:'sell' }; const first=tok[0].toLowerCase();
  if(sideMap[first] && tok.length>=3){ const side=sideMap[first], qty=tok[1], sym=tok[2].toUpperCase(); let otype='market',limit='';
    if(tok[3]==='@' && tok[4]){ otype='limit'; limit=tok[4]; } if(addToBasket(side,sym,qty,otype,limit)) toast('STAGED '+side.toUpperCase()+' '+qty+' '+sym+' → ticket basket'); S.cmd=''; render(); }
  else { loadSym(tok[0]); S.cmd=''; render(); }
}
// Stage the manual compose editor (side/symbol/qty/type/limit) into the basket.
function stageCompose(){
  const symU=(S.tSym||'').toUpperCase(), qty=parseFloat(S.tQty)||0;
  if(!symU || qty<=0){ toast('Enter a symbol and qty to stage'); return; }
  if(S.otype==='limit' && !(parseFloat(S.tLimit)>0)){ toast('Limit order needs a price'); return; }
  if(addToBasket(S.side,symU,S.tQty,S.otype,S.tLimit)){ toast('STAGED '+S.side.toUpperCase()+' '+qtyFmt(qty)+' '+symU); S.tSym=''; render(); }
}
function removeBasket(idx){ idx=+idx; if(idx>=0 && idx<S.basket.length){ S.basket.splice(idx,1); render(); } }
function clearBasket(){ S.basket=[]; render(); }
function basketRefPx(b){ const lp=M.positions.find(p=>p.sym===b.sym), w=M.watchlist.find(x=>x.sym===b.sym); const live=lp&&lp.price!=null?lp.price:(w&&w.price!=null?w.price:0); return (b.otype==='limit'&&b.limit)?(parseFloat(b.limit)||0):live; }
// Submit every staged order; placed ones leave the basket, rejected ones stay
// (with the first error surfaced) so they can be corrected and retried.
async function placeAll(){
  if(S.halted){ toast('TRADING HALTED — nothing placed'); return; }
  if(!M.tradingEnabled){ toast('NO BROKER CONFIGURED — set ALPACA_PAPER_KEY/SECRET'); return; }
  if(!S.basket.length){ toast('Basket is empty'); return; }
  let ok=0, fail=0, firstErr='';
  for(const b of [...S.basket]){
    const body={ symbol:b.sym, side:b.side, order_type:b.otype, qty:String(b.qty), tif:'day' };
    if(b.otype==='limit') body.limit_price=String(b.limit);
    try { await japi('POST','/api/orders',body); ok++; S.basket=S.basket.filter(x=>x!==b); }
    catch(e){ fail++; if(!firstErr) firstErr=e.message; }
  }
  toast(ok+' PLACED'+(fail?(' · '+fail+' REJECTED: '+firstErr):'')+' [paper]'); await refreshSilent();
}

    case 'toggleDock': S.dockOpen=!S.dockOpen; render(); break;

    case 'gotoPos': S.view='positions'; S.selSym=arg; S.tSym=arg; S.hoverIdx=null; render(); break;
    case 'add': quickAdd(arg); break;

    case 'setBuy': S.side='buy'; render(); break;
    case 'setSell': S.side='sell'; render(); break;

    case 'setLim': S.otype='limit'; render(); break;
    case 'stageCompose': stageCompose(); break;
    case 'placeAll': placeAll(); break;
    case 'removeBasket': removeBasket(arg); break;
    case 'clearBasket': clearBasket(); break;
    case 'cancelOrder': try{ await japi('DELETE','/api/orders/'+arg); toast('CANCEL REQUESTED'); await refreshSilent(); }catch(e){ toast('CANCEL FAILED: '+e.message); } break;
    case 'cancelAll': try{ await japi('POST','/api/orders/cancel_all'); toast('ALL OPEN ORDERS CANCELED'); await refreshSilent(); }catch(e){ toast('FAILED: '+e.message); } break;
    case 'delTx':
      if(S.confirmDelTx==arg){ // second click — confirmed
        try{ await japi('DELETE','/api/transactions/'+arg); S.confirmDelTx=null; toast('TRANSACTION DELETED'); await reloadTxns(); await refreshSilent(); }
        catch(e){ S.confirmDelTx=null; toast('DELETE FAILED: '+e.message); render(); }
      } else { S.confirmDelTx=arg; render(); } // first click — arm
      break;
    case 'halt': try{ await japi('POST','/api/trading/pause',{ paused:!S.halted }); S.halted=!S.halted; toast(S.halted?'TRADING HALTED':'TRADING RESUMED'); render(); }catch(e){ toast('FAILED: '+e.message); } break;
    case 'createAlert': createAlert(); break;
    case 'deleteAlert': try{ await japi('DELETE','/api/alerts/'+arg); toast('ALERT DELETED'); await refreshSilent(); }catch(e){ toast(e.message); } break;
    case 'wlSelect': selectWatchlist(+arg); break;
    case 'wlAddSymbols': wlAddSymbols(); break;
    case 'wlRemoveSym': wlRemoveSym(arg); break;
    case 'wlNewList': wlNewList(); break;
    case 'wlDeleteList': wlDeleteList(+arg); break;
    case 'setAggr': { const [k,l]=arg.split(':'); setAggr(k,l); break; }
    case 'stageIdea': { const i=arg.lastIndexOf(':'); stageIdea(arg.slice(0,i), arg.slice(i+1)); break; }
    case 'analyzeIdeas': analyzeIdeas(); break;
    case 'marketBrief': marketBrief(); break;
    case 'dismissAlert': try{ await japi('POST','/api/alerts/'+arg+'/dismiss'); await refreshSilent(); }catch(e){ toast(e.message); } break;
    case 'rearmAlert': try{ await japi('POST','/api/alerts/'+arg+'/rearm'); await refreshSilent(); }catch(e){ toast(e.message); } break;
    case 'reviewAlert': { const a=M.alerts.find(x=>x.id==arg); if(a&&a.draft){ if(addToBasket(a.draft.side,a.sym,a.draft.qty,a.draft.order_type,a.draft.limit_price)) toast('STAGED '+a.sym+' FROM ALERT → ticket basket'); render(); } break; }
    case 'stageRec': { const r=M.recs.find(x=>x.id==arg); if(r){ const side=['BUY','ADD'].includes(r.action)?'buy':'sell'; if(addToBasket(side,r.sym,r.action==='TRIM'?10:5,'market')) toast('STAGED '+r.sym+' FROM ANALYST → ticket basket'); render(); try{ await japi('POST','/api/recommendations/'+arg+'/accept'); }catch(e){} } break; }
    case 'dropRec': try{ await japi('POST','/api/recommendations/'+arg+'/dismiss'); M.recs=M.recs.filter(r=>r.id!=arg); render(); }catch(e){ toast(e.message); } break;
    case 'importOpen': S.importOpen=true; S.importPreview=null; S.importErr=''; render(); break;
    case 'importClose': S.importOpen=false; render(); break;
    case 'manageOpen': S.manageOpen=true; S.confirmDelPf=null; render(); break;
    case 'manageClose': S.manageOpen=false; S.confirmDelPf=null; render(); break;
    case 'newPortfolio': newPortfolio(); break;
    case 'delPortfolio': if(S.confirmDelPf===arg){ deletePortfolio(arg); } else { S.confirmDelPf=arg; render(); } break;
    case 'cancelDelPf': S.confirmDelPf=null; render(); break;
    case 'importPreview': doImportPreview(); break;
    case 'importConfirm': doImportConfirm(); break;
    case 'briefingRun': try{ await japi('POST','/api/analyst/briefing'); toast('BRIEFING REQUESTED…'); setTimeout(reloadAnalyst,1500); }catch(e){ toast(e.message); } break;
    case 'reviewRun': try{ await japi('POST','/api/analyst/review'); toast('WEEKLY REVIEW REQUESTED…'); setTimeout(reloadAnalyst,2000); }catch(e){ toast(e.message); } break;
  }
}
// Raw-CSV POST (japi is JSON-only). dry=true previews without writing.
async function jcsv(fmt, text, dry){
  const r = await fetch('/api/import/csv?format='+encodeURIComponent(fmt)+(dry?'&dry_run=true':''), { method:'POST', headers:{'content-type':'text/csv'}, body:text });
  const j = r.status===204 ? {} : await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error || ('import '+r.status));
  return j;
}
async function doImportPreview(){
  const text=(S.importText||'').trim();
  if(!text){ S.importErr='Choose a file or paste CSV first.'; S.importPreview=null; render(); return; }
  S.importBusy=true; S.importErr=''; render();
  try{ S.importPreview=await jcsv(S.importFmt, text, true); S.importErr=''; }
  catch(e){ S.importPreview=null; S.importErr=e.message; }
  S.importBusy=false; render();
}
async function doImportConfirm(){
  const text=(S.importText||'').trim(); if(!text || !S.importPreview) return;
  S.importBusy=true; S.importErr=''; render();
  try{
    const r=await jcsv(S.importFmt, text, false);

// Stock splits the provider knows about that aren't in the log — recorded
// shares are stuck pre-split while prices are split-adjusted, so both the
// valuation and the tax basis are wrong until recorded.
async function loadSplits(refresh){ try{ M.splits = await jget('/api/splits'+(refresh?'?refresh=true':'')); render(); }catch(e){} }
const applyingSplits = new Set(); // in-flight guard: one record per (symbol|date|ratio)
async function applySplit(arg){
  if(applyingSplits.has(arg)) return;       // ignore double-clicks — a second tx would double-apply the ratio
  // Parse from the RIGHT: only `symbol` could contain a '|'; the date/ratio can't.
  const k=arg.lastIndexOf('|'), j=arg.lastIndexOf('|', k-1);
  if(j<0) return;
  const symbol=arg.slice(0,j), exDate=arg.slice(j+1,k), ratio=arg.slice(k+1);
  applyingSplits.add(arg); render();         // disable the button immediately
  try{
    await japi('POST','/api/transactions',{kind:'split',symbol:symbol,qty:ratio,ts:exDate+'T15:00:00Z'});
    toast('RECORDED '+symbol+' SPLIT');
    await loadSplits(true);   // recompute — this split now matches
    await reloadTax();        // tax lots change
    await refreshSilent();    // position share count changes
  }catch(e){ toast(e.message); }
  finally{ applyingSplits.delete(arg); render(); }
}
function splitsBanner(){
  const m=(M.splits&&M.splits.missing)||[];
  if(!m.length) return '';
  const rows=m.map(s=>{
    const r=num(s.ratio);
    const label=r>=1 ? (qtyFmt(s.ratio)+'-for-1 split') : ('1-for-'+Math.round(1/r)+' reverse split');
    const rawArg=s.symbol+'|'+s.ex_date+'|'+s.ratio, busy=applyingSplits.has(rawArg);
    return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid #3A2F18;font-size:11.5px;">'+
      '<span style="font-weight:600;color:'+C.bright+';min-width:54px;">'+esc(s.symbol)+'</span>'+
      '<span style="color:'+C.body+';">'+esc(label)+' · ex-date '+esc(s.ex_date)+'</span>'+
      '<span style="color:'+C.faint+';">held '+qtyFmt(s.shares_held)+' sh</span>'+
      '<button data-act="applySplit" data-arg="'+esc(rawArg)+'"'+(busy?' disabled':'')+' title="Add the split transaction" style="margin-left:auto;font-family:inherit;font-size:10px;letter-spacing:0.4px;color:'+(busy?C.faint:C.amber)+';background:transparent;border:1px solid #3A2F18;border-radius:4px;padding:4px 10px;cursor:'+(busy?'default':'pointer')+';">'+(busy?'recording…':'＋ record split')+'</button></div>';
  }).join('');
  return '<div style="padding:12px 16px;background:linear-gradient(90deg,#2A1A0A,#0B0E13);border-bottom:1px solid #3A2F18;">'+
    '<div style="font-size:11px;font-weight:700;letter-spacing:0.5px;color:'+C.amber+';">⚠ '+m.length+' UNRECORDED STOCK SPLIT'+(m.length>1?'S':'')+' DETECTED</div>'+
    '<div style="font-size:10.5px;color:'+C.body+';margin-top:3px;line-height:1.5;">Prices are split-adjusted but your recorded shares aren’t — so the share count, valuation, and cost basis are wrong until you record '+(m.length>1?'these':'it')+'. <span style="color:'+C.faint+';">Only record a split you haven’t already corrected by hand — recording it again would double your shares.</span></div>'+
    rows+'</div>';
}

async function switchPortfolio(name){
  if(!name || name===M.activePortfolio) return;
  S.switching=name; render();
  try{ await japi('POST','/api/portfolios/switch',{name}); setTimeout(()=>location.reload(), 1200); }
  catch(e){ S.switching=''; toast(e.message); render(); }
}
async function refreshPortfolios(){
  try{ const pl=await jget('/api/portfolios'); M.portfolios=pl.portfolios||M.portfolios; if(pl.active) M.activePortfolio=pl.active; }catch(e){}

async function newPortfolio(){
  const name=(window.prompt('Name for the new portfolio:')||'').trim();
  if(!name) return;
  let created=false;
  try{ await japi('POST','/api/portfolios',{name}); created=true; }
  catch(e){
    // A create can fail because it already exists (e.g. a prior create whose
    // auto-switch was blocked by an open order). Refresh first so the entry
    // appears, then fall through to switching to it; surface any other error.
    await refreshPortfolios(); render();
    // Exact-name match only: a case/slug-collision 409 names a DIFFERENT
    // portfolio, so falling through would silently switch to the wrong one —
    // surface the error instead.
    const exists=(M.portfolios||[]).some(p=>p.name===name);
    if(!exists){ toast(e.message); return; }
  }
  // Make the new portfolio visible in the dropdown REGARDLESS of whether the
  // switch below succeeds — switching can be refused (open orders) and the
  // portfolio must not vanish until the next full reload.
  await refreshPortfolios(); render();
  toast((created?'CREATED "':'"')+name+'" — switching…');
  await switchPortfolio(name);
}

  }catch(e){ toast(e.message); render(); }
}

  if(id==='tLimit'){ S.tLimit=e.target.value; patchTicket(); return; }
  if(id==='importtext'){ S.importText=e.target.value; if(S.importPreview){ S.importPreview=null; render(); } return; } // editing invalidates a prior preview
  if(id==='wlAdd'){ S.wlAddText=e.target.value; return; }
  if(id==='alSym'){ S.newAlert.sym=e.target.value.toUpperCase(); return; }
  if(id==='alThr'){ S.newAlert.thr=e.target.value; return; }
  if(id==='alNote'){ S.newAlert.note=e.target.value; return; }
  if(id==='__taxyear'){ }
});
document.addEventListener('change', (e)=>{
  if(e.target.getAttribute && e.target.getAttribute('data-act')==='taxYear'){ M.taxYear=Number(e.target.value); reloadTax(); return; }
  if(e.target.id==='pfsel'){ switchPortfolio(e.target.value); return; }
  if(e.target.id==='alCond'){ S.newAlert.cond=e.target.value; render(); return; }
  if(e.target.id==='importfmt'){ S.importFmt=e.target.value; S.importPreview=null; S.importErr=''; render(); return; }
  if(e.target.id==='importfile'){
    const f=e.target.files && e.target.files[0];
    if(f){ f.text().then(t=>{ S.importText=t; S.importPreview=null; S.importErr=''; render(); }).catch(()=>{ S.importErr='Could not read that file.'; render(); }); }
    return;
  }
});
// lightweight ticket re-render on input (avoids losing focus via full render)
function patchTicket(){ /* full render preserves focus by id; cheap enough */ render(); }

document.addEventListener('keydown', (e)=>{
  const tag=(e.target.tagName||'').toLowerCase(); const typing=tag==='input'||tag==='textarea'||tag==='select';
  if(e.key==='/' && !typing){ e.preventDefault(); const c=$('cmd'); if(c) c.focus(); return; }
  if(e.key==='Escape'){ if(S.manageOpen){ S.manageOpen=false; S.confirmDelPf=null; render(); } else if(S.importOpen){ S.importOpen=false; render(); } else if(S.expanded){ S.expanded=null; render(); } else if(S.showHelp){ S.showHelp=false; render(); } else if(e.target.id==='cmd'){ S.cmd=''; e.target.blur(); render(); } return; }
  if(e.target.id==='cmd' && e.key==='Enter'){ runCmd(S.cmd); render(); return; }
  if(typing) return;
  if(e.key==='?'){ e.preventDefault(); S.showHelp=!S.showHelp; render(); return; }
  if(e.key>='1' && e.key<=String(VIEWS.length)){ setView(VIEWS[+e.key-1]); return; }
  const k=e.key.toLowerCase();
  if(k==='t'){ S.dockOpen=!S.dockOpen; render(); return; }
  if(k==='b'){ S.side='buy'; render(); return; }
  if(k==='s'){ S.side='sell'; render(); return; }
  if(S.view==='positions' && M.positions.length){
    const idx=M.positions.findIndex(p=>p.sym===S.selSym);
    if(e.key==='ArrowDown'||k==='j'){ e.preventDefault(); const ni=Math.min((idx<0?0:idx)+1,M.positions.length-1); S.selSym=M.positions[ni].sym; S.hoverIdx=null; render(); return; }
    if(e.key==='ArrowUp'||k==='k'){ e.preventDefault(); const ni=Math.max((idx<0?0:idx)-1,0); S.selSym=M.positions[ni].sym; S.hoverIdx=null; render(); return; }
    if(e.key==='Enter'){ const p=M.positions[idx>=0?idx:0]; if(p) loadSym(p.sym); render(); return; }
  }
});

//================================================================ boot
render();   // initial chrome with placeholders before data lands
loadAll();
connect();
// Tick the header clock once a minute, but never while an input is focused
// (a re-render would steal the caret).
setInterval(()=>{ const a=document.activeElement; if(!a || a.tagName!=='INPUT') render(); }, 60000);
</script>
